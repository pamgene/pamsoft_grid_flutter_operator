name: pamsoft_grid_flutter_operator
description: "Quality control application for reviewing automated fiducial grid fitting on Pamstation experiment images."
publish_to: 'none'
version: 0.0.1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Service locator for dependency injection
  get_it: ^7.6.4

  # UI components
  cupertino_icons: ^1.0.8
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets are served directly from web/assets/ folder for Tercen compatibility
  # assets:
  #   - assets/images/
