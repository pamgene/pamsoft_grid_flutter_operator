name: pamsoft_grid_flutter_operator
description: "Quality control application for reviewing automated fiducial grid fitting on Pamstation experiment images."
publish_to: 'none'
version: 0.0.3

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Service locator for dependency injection
  get_it: ^7.6.4

  # UI components
  cupertino_icons: ^1.0.8
  package_info_plus: ^9.0.0
  font_awesome_flutter: ^10.6.0
  url_launcher: ^6.2.1

  # Image processing for TIFF to PNG conversion
  image: ^4.2.0

  # Web interop for WASM compatibility (replaces dart:html)
  web: ^0.5.1

  # Tercen API client for reading data
  sci_tercen_client:
    git:
      url: https://github.com/tercen/sci_tercen_client
      ref: 1.12.0
      path: sci_tercen_client

  # Tercen operator context (ctx.select/cselect/rselect)
  sci_tercen_context:
    git:
      url: https://github.com/tercen/sci_tercen_client
      ref: 1.12.0
      path: sci_tercen_context

  # TSON binary format (CStringList for typed string arrays)
  tson:
    git:
      url: https://github.com/tercen/dtson
      ref: 1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets are served directly from web/assets/ folder for Tercen compatibility
  # assets:
  #   - assets/images/
